<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정원오 뉴스 통합 모니터링</title>
    <style>
        /* 많은 매체를 보여주기 위한 그리드 레이아웃 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .stat-card h4 { margin: 0; color: #555; font-size: 14px; }
        .stat-card p { font-size: 24px; font-weight: bold; color: #1e40af; margin: 5px 0 0; }
        
        .press-section { margin-top: 40px; }
        .press-group-title { 
            position: sticky; top: 0; background: #f8fafc;
            padding: 10px; border-bottom: 2px solid #1e40af; 
            font-weight: bold; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>종합 뉴스 모니터링 보고서</h1>
        
        <div class="summary-grid">
            <div class="stat-card"><h4>방송사</h4><p>{{방송사_수}}</p></div>
            <div class="stat-card"><h4>통신사</h4><p>{{통신사_수}}</p></div>
            <div class="stat-card"><h4>주요 일간지</h4><p>{{일간지_수}}</p></div>
            <div class="stat-card"><h4>기타/전문지</h4><p>{{기타_수}}</p></div>
        </div>

        <div class="press-section">
            <div class="press-group-title">방송사 (KBS, MBC, SBS 등)</div>
            <div class="article-item">...</div>
        </div>
        
        <div class="press-section">
            <div class="press-group-title">뉴스 통신사 (연합뉴스, 뉴스1 등)</div>
            <div class="article-item">...</div>
        </div>
    </div>
</body>
</html>
